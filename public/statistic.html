<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/statistic.css">
    <link rel="stylesheet" href="css/uni.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/dark.css">
    <title>Статистика</title>
</head>
<body>
    <nav class="parent">
        <div class="parent" id="headName">
            <img alt="Меню" src="menu.svg" id="menu" style="display: none;">
            <h1>Система</h1>
        </div>
        <div id="nameShop">
            <p id="userName"></p>
            <a href="/"><img alt="Главная" src="svg/shop.svg" id="main"></a>
            <a href="/statistic"><img alt="Статистика" src="svg/statistics.svg" id="stat"></a>
            <a href="/logs"><img alt="Журнал действий" src="svg/file.svg" id="logs"></a>
            <a href="/settings"><img alt="Настройки" src="svg/settings.svg" id="sett"></a>
            <img alt="Выход" src="svg/export.svg" id="logoutButton">
        </div>
    </nav>
    <main>
        <div>
            <h1>Доход за день</h1>
            <section>
                <button id="dayPrev">Назад</button>
                <p id="nowDay"></p>
                <button id="dayNext">Вперёд</button>
            </section>
            <h2 id="dayIncome">0 рублей</h2>
        </div>
        <div>
            <h1>Доход за месяц</h1>
            <section>
                <button id="monthPrev">Назад</button>
                <p id="nowMonth"></p>
                <button id="monthNext">Вперёд</button>
            </section>
            <h2 id="monthIncome">0 рублей</h2>
        </div>
    </main>
    <section class="workers">
        <div>
            <h1>Сотрудники (день)</h1>
            <div id="workersDay"></div>
        </div>
        <div>
            <h1>Сотрудники (месяц)</h1>
            <div id="workersMonth"></div>
        </div>
    </section>
    <div id="modal-menu">
        <div id="menu-window">
            <a href="/"><button>Список заказов</button></a>
            <a href="/archive"><button>Архив</button></a>
            <a href="/settings"><button>Настройки</button></a>
            <a href="/logs"><button>Журнал действий</button></a>
            <a id="logoutButton"><button>Выход</button></a>
        </div>
    </div>
</body>
<script src="js/menu.js"></script>
<script src="js/statistic.js"></script>
<script src="js/theme.js"></script>
</html>
