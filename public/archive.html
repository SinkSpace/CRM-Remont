<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="light.css" id="data-theme">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <title>CRM</title>
</head>
<body>
    <nav class="parent">
        <div class="parent" id="headName">
            <img alt="Меню" src="menu.svg" id="menu">
            <h1>CRM</h1>
        </div>
        <div>
            <input id="search" placeholder="🔍">
            <select id="filter">
            <option>Все статусы</option>
            <option>Принят</option>
            <option>В работе</option>
            <option>Ждёт запчастей</option>
            <option>На согласовании</option>
            <option>Без ремонта</option>
            <option>Сделан</option>
            <option>Отменён</option>
        </select>
        </div>
        <div id="nameShop">
            <p style="color: white;">example@example.ru</p>
            <p style="color: gray;">Магазин "Пример"</p>
        </div>
    </nav>
    <header class="parent">
        <button style="visibility: hidden;">Добавить заказ</button>
        <h2>Архив</h2>
        <button id="addOrder" style="visibility: hidden;">Добавить заказ</button>
    </header>
    <main>
        <article id="orderTable">
            <section id="mainHead">
                <div id="numberHead">№</div>
                <div id="modelHead">Модель</div>
                <div id="statusHead">Статус</div>
                <div id="bugHead">Неисправность</div>
                <div id="priceHead">Цена</div>
                <div id="workerHead">Исполнитель</div>
                <div id="dateBeginHead">Выдача</div>
                <div id="dateHead">До выдачи</div>
                <div id="editHead">Действия</div>
            </section>
                <!-- заполняется из localstorage -->
        </article>
    </main>
    <p><h1 id="noTask">Активных задач нет</h1></p>
    <p><h1 id="noSearch">Задачи не найдены</h1></p>
    <div id="modal"> <!--Модальное окно-->
        <div id="modal-window">
            <img id="closeButton" src="close.svg"></img> 
            <div id="modal-content">
                <div id="dateDiv"><section>
                <p>Устройство</p> <select id="deviceInput">
                    <option>Смартфон</option>
                    <option>Планшет</option>
                    <option>Ноутбук</option>
                    <option>Настольный компьютер</option>
                    <option>Умные часы</option>
                    <option>Фитнес‑браслет</option>
                    <option>Электронная книга</option>
                    <option>Игровая консоль</option>
                    <option>Смарт‑телевизор</option>
                    <option>Голосовой помощник (умная колонка)</option>
                </select></section>
                <section><p>Марка и модель</p> <input id="modelInput"></section></div>
                <p>Статус</p> <select id="statusInput">
                    <option>Принят</option>
                    <option>В работе</option>
                    <option>Ждёт запчастей</option>
                    <option>На согласовании</option>
                    <option>Без ремонта</option>
                    <option>Сделан</option>
                    <option>Отменён</option>
                </select>
                <p>Неисправность</p> <input id="crushInput">
                <p>Стоимость ремонта</p> <input type="number" id="priceInput">
                <p>Исполнитель</p> <input id="workerInput">
                <p>Примечание</p> <input id="noteInput">
                <div id="dateDiv"><section><p>Дней на ремонт</p> <input type="number" id="deadline"></section>
                <section><p>Дата выдачи</p> <input type="date" id="dateInput"></section></div>
                <p><button id="modal-button">Добавить</button>
                <button id="modal-archive">В архив</button></p>
            </div>
        </div>
    </div>
    <div id="modal-menu">
        <div id="menu-window">
            <a href="/"><button>Список заказов</button></a>
            <a href="/archive"><button>Архив</button></a>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
