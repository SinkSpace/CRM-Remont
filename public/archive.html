<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/uni.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <title>Архив</title>
</head>
<body>
    <nav class="parent">
        <div class="parent" id="headName">
            <img alt="Меню" src="menu.svg" id="menu" style="display: none;">
            <h1>CRM-Sink</h1>
        </div>
        <div>
            <input id="search" placeholder="🔍">
        </div>
        <div id="nameShop">
            <p id="userName"></p>
            <a href="/"><img alt="Главная" src="svg/shop.svg" id="main"></a>
            <a href="/statistic"><img alt="Статистика" src="svg/statistics.svg" id="stat"></a>
            <a href="/logs"><img alt="Журнал действий" src="svg/file.svg" id="logs"></a>
            <a href="/settings"><img alt="Настройки" src="svg/settings.svg" id="sett"></a>
            <img alt="Профиль" src="svg/businessman.svg" id="profile">
        </div>
    </nav>

    <header class="parent">
        <a href="/"><button>Список заказов</button></a>
        <h2>Архив заказов</h2>
        <a href="/" style="visibility: hidden;"><button>Список заказов</button></a>
    </header>

    <main>
        <article id="archiveTable">
            <section id="mainHead">
                <div id="numberHead">№</div>
                <div id="modelHead">Модель</div>
                <div id="statusHead">Статус</div>
                <div id="bugHead">Неисправность</div>
                <div id="priceHead">Цена</div>
                <div id="workerHead">Исполнитель</div>
                <div id="dateBeginHead">Выдача</div>
                <div id="dateHead">Архив</div>
                <div id="editHead">Действия</div>
            </section>
        </article>
    </main>

    <p><h1 id="noTask">Архив пуст</h1></p>
    <p><h1 id="noSearch">Заказы не найдены</h1></p>

    <div id="modal-menu">
        <div id="menu-window">
            <a href="/"><button>Список заказов</button></a>
            <a href="/archive"><button>Архив</button></a>
            <a href="/settings"><button>Настройки</button></a>
            <a href="/logs"><button>Журнал действий</button></a>
            <a id="logoutButton"><button>Выход</button></a>
        </div>
    </div>
</body>
<script src="js/archive.js"></script>
<script src="js/menu.js"></script>
<script src="js/theme.js"></script>
</html>
