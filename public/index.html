<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/svg/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/uni.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <title>Главная страница</title>
</head>
<body>
    <nav class="parent">
        <div class="parent" id="headName">
            <img alt="Меню" src="svg/menu.svg" id="menu" style="display: none;">
            <a href="/" id="headButton"><h1>CRM-Sink</h1></a>
        </div>
        <div>
            <input id="search" placeholder="🔍">
            <select id="filter">
                <option>Все статусы</option>
            </select>
        </div>
        <div id="nameShop">
            <p id="userName"></p>
            <a href="/"><img alt="Главная" src="svg/shop.svg" id="main"></a>
            <a href="/statistic"><img alt="Статистика" src="svg/statistics.svg" id="stat"></a>
            <a href="/logs"><img alt="Журнал действий" src="svg/file.svg" id="logs"></a>
            <a href="/settings"><img alt="Настройки" src="svg/settings.svg" id="sett"></a>
            <img alt="Выход" src="svg/export.svg" id="logoutButton">
        </div>
    </nav>
    <header class="parent">
        <a href="/archive"><button style="background-color: gray;">Архив</button></a>
        <button style="visibility: hidden;" class="novis">Добавить заказ</button>
        <h2>Список заказов</h2>
        <button style="visibility: hidden;" class="novis">Архив</button>
        <button id="addOrder">Добавить заказ</button>
    </header>
    <main>
        <article id="orderTable">
            <section id="mainHead">
                <div id="numberHead">№</div>
                <div id="modelHead">Модель</div>
                <div id="statusHead">Статус</div>
                <div id="bugHead">Неисправность</div>
                <div id="priceHead">Цена</div>
                <div id="workerHead">Исполнитель</div>
                <div id="dateHead">До выдачи</div>
                <div id="editHead"></div>
            </section>
        </article>
    </main>
    <p><h1 id="noTask">Активных задач нет</h1></p>
    <p><h1 id="noSearch">Задачи не найдены</h1></p>
    <div id="modal"> <!-- Модальное окно -->
    <div id="modal-window">
        <button id="closeButton" type="button" aria-label="Закрыть">✕</button>

        <div id="modal-content">
            <div class="modal-row modal-row-3">
                <section class="field">
                    <label for="phoneInput">Номер для связи</label>
                    <input id="phoneInput" list="contactHints" type="tel">
                    <datalist id="contactHints"></datalist>
                </section>

                <section class="field">
                    <label for="customerInput">Заказчик</label>
                    <input id="customerInput" list="customerHints" type="text">
                    <datalist id="customerHints"></datalist>
                </section>

                <section class="field">
                    <label for="workerInput">Исполнитель</label>
                    <select id="workerInput">
                        <option value="">Выберите сотрудника</option>
                    </select>
                </section>
            </div>

            <div class="modal-row modal-row-3">
                <section class="field">
                    <label for="deviceInput">Устройство</label>
                    <input id="deviceInput" list="deviceHints" type="text" placeholder="Например: Смартфон, Ноутбук, Планшет">
                    <datalist id="deviceHints"></datalist>
                </section>

                <section class="field">
                    <label for="modelInput">Марка и модель</label>
                    <input id="modelInput" type="text">
                </section>

                <section class="field">
                    <label for="SNInput">SN</label>
                    <input id="SNInput" type="text">
                </section>
            </div>

            <div class="modal-row modal-row-3">
                <section class="field">
                <label for="priceInput">Стоимость ремонта</label>

                <div class="price-main-row">
                    <input type="number" id="priceInput">
                    <button type="button" id="togglePriceCalc" class="mini-button">+</button>
                </div>

                <div id="priceCalcBox" class="price-calc-box" style="display: none;">
                    <input type="number" class="price-part" placeholder="Работа">
                    <input type="number" class="price-part" placeholder="Запчасти">
                    <input type="number" class="price-part" placeholder="Доп. услуги">
                    <input type="number" class="price-part" placeholder="Прочее">
                </div>
            </section>

                <section class="field">
                    <label for="preInput">Предоплата</label>
                    <input type="number" id="preInput">
                </section>

                <section class="field">
                    <label for="statusInput">Статус</label>
                    <select id="statusInput"></select>
                </section>
            </div>

            <div class="modal-row modal-row-2">
                <section class="field">
                    <label for="deadline">Дней на ремонт</label>
                    <input type="number" id="deadline">
                </section>

                <section class="field">
                    <label for="dateInput">Дата выдачи</label>
                    <input type="date" id="dateInput">
                </section>
            </div>

            <div class="modal-row modal-row-2">
                <section class="field">
                    <label for="crushInput">Неисправность</label>
                    <input id="crushInput" type="text">
                </section>

                <section class="field">
                    <label for="noteInput">Примечание</label>
                    <input id="noteInput" type="text">
                </section>
            </div>

            <div class="modal-actions">
                <section>
                <button id="modal-button" type="button">Добавить</button>
                <button id="docButton" class="dop-button" type="button" style="display: none;">Создать документ</button>
                <button id="aiButton" class="dop-button" type="button" style="display: none;">Спросить ИИ</button>
                </section>
                <button id="archiveButton" class="dop-button" type="button" style="display: none; background-color: lime;">Выдать</button>
            </div>
        </div>

        <div id="out">

        </div>
    </div>
</div>
    <div id="modal-menu">
        <div id="menu-window">
            <a href="/"><button>Список заказов</button></a>
            <a href="/archive"><button>Архив</button></a>
            <a href="/settings"><button>Настройки</button></a>
            <a href="/logs"><button>Журнал действий</button></a>
            <a id="logoutButton"><button>Выход</button></a>
        </div>
    </div>
</body>
<script src="js/menu.js"></script>
<script src="js/index.js"></script>
<script src="js/theme.js"></script>
</html>
