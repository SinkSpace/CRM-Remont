<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/light.css" id="data-theme">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/uni.css">
    <link rel="stylesheet" href="css/mobile.css">
    <title>CRM</title>
</head>
<body>
    <nav class="parent">
        <div class="parent" id="headName">
            <img alt="Меню" src="menu.svg" id="menu">
            <h1>CRM</h1>
        </div>
        <div>
            <input id="search" placeholder="🔍">
            <select id="filter">
            <option>Все статусы</option>
            <option>Принят</option>
            <option>В работе</option>
            <option>Ждёт запчастей</option>
            <option>На согласовании</option>
            <option>Без ремонта</option>
            <option>Сделан</option>
            <option>Отменён</option>
        </select>
        </div>
        <div id="nameShop">
            <span id="userName"></span>
            <span id="userEmail"></span>
        </div>
    </nav>
    <header class="parent">
        <button style="visibility: hidden;">Добавить заказ</button>
        <h2>Список заказов</h2>
        <button id="addOrder">Добавить заказ</button>
    </header>
    <main>
        <article id="orderTable">
            <section id="mainHead">
                <div id="numberHead">№</div>
                <div id="modelHead">Модель</div>
                <div id="statusHead">Статус</div>
                <div id="bugHead">Неисправность</div>
                <div id="priceHead">Цена</div>
                <div id="workerHead">Исполнитель</div>
                <div id="dateBeginHead">Выдача</div>
                <div id="dateHead">До выдачи</div>
                <div id="editHead">Действия</div>
            </section>
                <!-- заполняется из localstorage -->
        </article>
    </main>
    <p><h1 id="noTask">Активных задач нет</h1></p>
    <p><h1 id="noSearch">Задачи не найдены</h1></p>
    <div id="modal"> <!-- Модальное окно -->
    <div id="modal-window">
        <button id="closeButton" type="button" aria-label="Закрыть">✕</button>

        <div id="modal-content">
            <div class="modal-row modal-row-3">
                <section class="field">
                    <label for="phoneInput">Номер для связи</label>
                    <input id="phoneInput" type="text">
                </section>

                <section class="field">
                    <label for="customerInput">Заказчик</label>
                    <input id="customerInput" type="text">
                </section>

                <section class="field">
                    <label for="workerInput">Исполнитель</label>
                    <select id="workerInput">
                        <option value="">Выберите сотрудника</option>
                    </select>
                </section>
            </div>

            <div class="modal-row modal-row-3">
                <section class="field">
                    <label for="deviceInput">Устройство</label>
                    <select id="deviceInput">
                        <option value="">Выберите устройство</option>
                    </select>
                </section>

                <section class="field">
                    <label for="modelInput">Марка и модель</label>
                    <input id="modelInput" type="text">
                </section>

                <section class="field">
                    <label for="SNInput">SN</label>
                    <input id="SNInput" type="text">
                </section>
            </div>

            <div class="modal-row modal-row-2 checks-row">
                <label class="check-field">
                    <input type="checkbox" id="deviceBox" style="width: auto; height: auto;">
                    <span>Аппарат</span>
                </label>

                <label class="check-field">
                    <input type="checkbox" id="chargeryBox" style="width: auto; height: auto;">
                    <span>Зарядное устройство</span>
                </label>
            </div>

            <div class="modal-row modal-row-3">
                <section class="field">
                    <label for="priceInput">Стоимость ремонта</label>
                    <input type="number" id="priceInput">
                </section>

                <section class="field">
                    <label for="preInput">Предоплата</label>
                    <input type="number" id="preInput">
                </section>

                <section class="field">
                    <label for="statusInput">Статус</label>
                    <select id="statusInput">
                        <option>Принят</option>
                        <option>В работе</option>
                        <option>Ждёт запчастей</option>
                        <option>На согласовании</option>
                        <option>Без ремонта</option>
                        <option>Сделан</option>
                        <option>Отменён</option>
                    </select>
                </section>
            </div>

            <div class="modal-row modal-row-2">
                <section class="field">
                    <label for="deadline">Дней на ремонт</label>
                    <input type="number" id="deadline">
                </section>

                <section class="field">
                    <label for="dateInput">Дата выдачи</label>
                    <input type="date" id="dateInput">
                </section>
            </div>

            <div class="modal-row modal-row-2">
                <section class="field">
                    <label for="crushInput">Неисправность</label>
                    <input id="crushInput" type="text">
                </section>

                <section class="field">
                    <label for="noteInput">Примечание</label>
                    <input id="noteInput" type="text">
                </section>
            </div>

            <div class="modal-actions">
                <button id="modal-button" type="button">Добавить</button>
            </div>
        </div>
    </div>
</div>
    <div id="modal-menu">
        <div id="menu-window">
            <a href="/"><button>Список заказов</button></a>
            <!--<a href="/track"><button>Отслеживание заказов</button></a>-->
            <a href="/settings"><button>Настройки</button></a>
            <a href="/logs"><button>Логи</button></a>
            <a href="/admin"><button>Админ-панель</button></a>
            <a id="logoutButton"><button>Выход</button></a>
        </div>
    </div>
</body>
<script src="js/index.js"></script>
<script src="js/menu.js"></script>
</html>
